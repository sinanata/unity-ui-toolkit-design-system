<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0B0F17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #0B0F17;
      color: #F2F4F7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      position: fixed; inset: 0;
      touch-action: none;
    }

    #unity-container {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    #unity-canvas {
      width: 100%; height: 100%;
      display: block;
      background: #0B0F17;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Loading screen — replaces Unity's default white-flash splash. */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0B0F17;
      z-index: 2;
      transition: opacity 240ms ease-out;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #A1A7B3;
      margin: 0 0 24px 0;
    }
    #loading-bar {
      position: relative;
      width: 240px; height: 4px;
      background: #1A2330;
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, #22C55E 0%, #16A34A 100%);
      border-radius: 2px;
      transition: width 120ms ease-out;
    }
    #loading-pct {
      margin-top: 12px;
      font-size: 11px;
      color: #677085;
    }

    /* Footer ribbon — keeps the LoL hook visible without occluding the canvas. */
    #ribbon {
      position: absolute;
      bottom: 8px; right: 12px;
      font-size: 11px;
      color: #677085;
      z-index: 3;
      pointer-events: auto;
    }
    #ribbon a {
      color: #A1A7B3;
      text-decoration: none;
      border-bottom: 1px dotted #263041;
    }
    #ribbon a:hover { color: #22C55E; border-bottom-color: #22C55E; }

    /* Mobile breakpoint — CSS pixels, drives the ribbon + loading-bar. The
       UI Toolkit `.mobile` class is applied separately by ShowcaseBootstrap
       in C#, comparing the panel root's resolved layout width (also CSS-px,
       because the panel scale is set to devicePixelRatio). Both sides agree
       on units now; when `Screen.width` is read directly inside Unity it is
       BUFFER pixels = CSS × DPR, so don't compare it against 768 raw. */
    @media (max-width: 767px) {
      #ribbon { font-size: 10px; bottom: 4px; right: 6px; }
      #loading-bar { width: 180px; }
    }
  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<div id="loading">
  <h1>{{{ PRODUCT_NAME }}}</h1>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <div id="loading-pct">0%</div>
</div>

<div id="ribbon">
  Built for <a href="https://leapoflegends.com" target="_blank" rel="noopener">Leap of Legends</a>
  · <a href="https://github.com/sinanata/unity-ui-document-design-system" target="_blank" rel="noopener">repo</a>
</div>

<script src="Build/{{{ LOADER_FILENAME }}}"></script>
<script>
  // Loader config. Decompression fallback is enabled in PlayerSettings so
  // GitHub Pages can serve .br files without setting Content-Encoding.
  const config = {
    arguments: [],
    dataUrl: "Build/{{{ DATA_FILENAME }}}",
    frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
    codeUrl: "Build/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
    memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
    symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
    streamingAssetsUrl: "StreamingAssets",
    companyName: "{{{ COMPANY_NAME }}}",
    productName: "{{{ PRODUCT_NAME }}}",
    productVersion: "{{{ PRODUCT_VERSION }}}",
    // Render at the device's native pixel density. Hard-pinning this to 1
    // makes the canvas look soft/upscaled on every Retina laptop and iPhone
    // (DPR 2-3) — the classic "Unity WebGL low resolution" complaint.
    devicePixelRatio: window.devicePixelRatio || 1,
    matchWebGLToCanvasSize: true,
  };

  const canvas      = document.querySelector("#unity-canvas");
  const loadingEl   = document.querySelector("#loading");
  const fillEl      = document.querySelector("#loading-fill");
  const pctEl       = document.querySelector("#loading-pct");

  // Resize canvas to match the visible viewport. matchWebGLToCanvasSize=true
  // tells Unity to keep the WebGL drawing buffer in sync with this CSS size.
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.style.width  = window.innerWidth  + "px";
    canvas.style.height = window.innerHeight + "px";
    canvas.width  = Math.floor(window.innerWidth  * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
  }
  window.addEventListener("resize", resize);
  resize();

  // iOS Safari: prevent page bouncing / pinch-zoom from leaking into the canvas.
  document.addEventListener("touchmove", (e) => { e.preventDefault(); }, { passive: false });
  document.addEventListener("gesturestart", (e) => { e.preventDefault(); }, { passive: false });

  createUnityInstance(canvas, config, (progress) => {
    const pct = Math.round(progress * 100);
    fillEl.style.width = pct + "%";
    pctEl.textContent  = pct + "%";
  })
  .then((unityInstance) => {
    loadingEl.classList.add("fade");
    setTimeout(() => loadingEl.remove(), 280);
  })
  .catch((message) => {
    pctEl.textContent = "Failed to load.";
    pctEl.style.color = "#EF4444";
    console.error(message);
  });
</script>
</body>
</html>
