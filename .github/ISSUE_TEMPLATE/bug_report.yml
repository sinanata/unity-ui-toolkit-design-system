name: Bug report
description: A component renders or behaves incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. If you can, reproduce it in the showcase first (open `Assets/Showcase/Showcase.unity` and press Play), and attach a screenshot of the broken state next to the showcase's expected state.
  - type: input
    id: unity-version
    attributes:
      label: Unity version
      description: Unity 6 USS additions behave differently across 6000.0.x patch releases.
      placeholder: "6000.0.42f1"
    validations:
      required: true
  - type: dropdown
    id: pipeline
    attributes:
      label: Render pipeline
      options:
        - URP
        - HDRP
        - Built-in
    validations:
      required: true
  - type: input
    id: component
    attributes:
      label: Component or class
      description: Which `ds-*` class is affected?
      placeholder: ".ds-toggle"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you saw versus what you expected. A diff against the showcase's expected state helps.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, or a minimal UXML if the bug only appears in your own project.
      render: xml
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I reproduced this in the showcase, or attached a minimal UXML.
        - label: I attached a screenshot of the broken versus expected state.
